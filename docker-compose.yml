# ================================================================
# HeritageGraph Docker Compose Configuration
# ================================================================
# This is the main docker-compose file for orchestrating all
# services. Use with environment variables from .env file
#
# For development: docker-compose up --build
# For production: docker-compose -f docker-compose.yml \
#                 -f docker-compose.prod.yml up -d
# ================================================================

# ================================================================
# SERVICES
# ================================================================
services:
  # ---------------------------------------------------------------
  # PostgreSQL Database
  # Database for Django backend
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: heritage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heritage_db}
      POSTGRES_USER: ${POSTGRES_USER:-heritage_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      HERITAGE_DB_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Traefik Reverse Proxy & Load Balancer
  # Routes all traffic to appropriate services
  # ---------------------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: heritage-traefik
    restart: unless-stopped
    command:
      # API & Dashboard (disabled in production)
      - "--api.dashboard=true"
      - "--api.debug=true"
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--providers.file.filename=/etc/traefik/traefik.yml"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Logs
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard (disable in production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
      - ./infra/traefik/acme:/etc/traefik/acme
      - traefik-logs:/var/log/traefik
    networks:
      - proxy
    labels:
      # Dashboard configuration
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
      # Basic auth for dashboard (optional)
      # - "traefik.http.routers.dashboard.middlewares=auth"
      # - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$..."
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Django REST Framework Backend
  # Main API server
  # ---------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: heritage-backend
    restart: unless-stopped
    environment:
      # Django settings
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-heritage_graph.settings.production}
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend.localhost}
      # Database
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-heritage_db}
      DB_USER: ${DB_USER:-heritage_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: postgres
      DB_PORT: 5432
      # Google Auth (backend verifies Google ID tokens)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://frontend.localhost}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./heritage_graph:/app/heritage_graph
      - backend-static:/app/heritage_graph/staticfiles
      - backend-media:/app/heritage_graph/media
    networks:
      - proxy
      - backend
    expose:
      - 8000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`backend.localhost`) || PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.services.backend.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.backend.loadbalancer.healthcheck.interval=10s"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Next.js Frontend
  # Main UI application
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./heritage_graph_ui
      dockerfile: Dockerfile
    container_name: heritage-frontend
    restart: unless-stopped
    environment:
      # Frontend configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend.localhost/api}
      # NextAuth + Google OAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://frontend.localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Standalone server must listen on all interfaces
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Internal backend URL for server-side calls (NextAuth)
      INTERNAL_BACKEND_URL: http://backend:8000
    networks:
      - proxy
      - backend
    expose:
      - 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`frontend.localhost`) || Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Landing Page (Next.js)
  # Marketing/landing page
  # ---------------------------------------------------------------
  landing:
    build:
      context: ./heritage_graph_landing
      dockerfile: Dockerfile
    container_name: heritage-landing
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - proxy
    expose:
      - 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`landing.localhost`)"
      - "traefik.http.routers.landing.entrypoints=web"
      - "traefik.http.services.landing.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------

# ================================================================
# VOLUMES
# ================================================================
volumes:
  postgres-data:
    driver: local
  backend-static:
    driver: local
  backend-media:
    driver: local
  traefik-logs:
    driver: local

# ================================================================
# NETWORKS
# ================================================================
networks:
  # Proxy network for Traefik routing
  proxy:
    driver: bridge
  # Backend network for inter-service communication
  backend:


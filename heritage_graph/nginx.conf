worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

error_log /home/django/logs/nginx_error.log;

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;

    access_log /home/django/logs/nginx_access.log;

    # Temp paths (non-root)
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path /tmp/nginx_proxy;
    uwsgi_temp_path /tmp/nginx_uwsgi;

    # Security header defaults
    map $upstream_http_referrer_policy $hdr_referrer_policy { '' "strict-origin-when-cross-origin"; }
    map $upstream_http_x_content_type_options $hdr_x_content_type_options { '' "nosniff"; }
    map $upstream_http_x_frame_options $hdr_x_frame_options { '' "DENY"; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream uvicorn {
        server unix:/tmp/uvicorn.sock;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 1G;
        server_tokens off;

        # Basic security headers
        add_header Referrer-Policy $hdr_referrer_policy always;
        add_header X-Content-Type-Options $hdr_x_content_type_options always;
        add_header X-Frame-Options $hdr_x_frame_options always;

        # Serve static files
        location /static/ {
            alias /home/django/static/;
            gzip on;
            gzip_comp_level 6;
            gzip_types text/javascript application/javascript application/wasm image/x-icon;
        }

        # Protect internal media/data
        location /data/ {
            internal;
            alias /home/django/data/;
        }

        # Proxy to Uvicorn
        location / {
            proxy_pass http://uvicorn;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect off;
            proxy_buffering on;
            proxy_buffers 16 8k;
        }
    }
}

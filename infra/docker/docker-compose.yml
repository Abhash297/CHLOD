version: "3.9"

services:
  # -------------------
  # Postgres Database
  # -------------------
  db:
    image: postgres:14
    container_name: heritagegraph-db
    restart: always
    environment:
      POSTGRES_DB: keycloak        # database name
      POSTGRES_USER: keycloak      # user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # use strong password from .env
    volumes:
      - db-data:/var/lib/postgresql/data   # persistent volume for data
    networks:
      - backend
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------
  # Keycloak
  # -------------------
  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    container_name: heritagegraph-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    command: start
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    ports:
      - "8080:8080"

volumes:
  keycloak-db-data:

networks:
  backend:
